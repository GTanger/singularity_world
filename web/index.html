<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<meta name="theme-color" content="#1e2328">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>奇點世界</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%232a2a2a' width='32' height='32'/><text x='16' y='22' font-size='18' fill='%23e0e0e0' text-anchor='middle' font-family='sans-serif'>奇</text></svg>">
	<link rel="apple-touch-icon" href="/icon.svg">
	<link rel="manifest" href="/manifest.webmanifest">
	<link rel="stylesheet" href="style.css?v=9.19">
</head>
<body>
	<!-- 登入／創角：未登入時顯示，登入成功後隱藏 -->
	<div id="auth-screen" class="auth-screen">
		<div class="auth-box">
			<h2 class="auth-title">奇點世界</h2>
			<p class="auth-hint" id="auth-hint">請輸入 ID 與密碼登入</p>
			<p class="auth-error" id="auth-message" role="alert" aria-live="polite"></p>
			<form id="auth-form" class="auth-form" autocomplete="off">
				<div class="auth-field">
					<label for="auth-id">角色 ID <span class="auth-label-note">（ID 即為角色姓名）</span></label>
					<input type="text" id="auth-id" name="id" required minlength="2" maxlength="32" placeholder="2～32 字元" autocomplete="username">
				</div>
				<div class="auth-field">
					<label for="auth-password">密碼</label>
					<input type="password" id="auth-password" name="password" required minlength="6" placeholder="至少 6 字元" autocomplete="current-password">
				</div>
				<div class="auth-field auth-field-create" id="auth-display-wrap" hidden>
					<label for="auth-display-char">顯示字（選填）</label>
					<input type="text" id="auth-display-char" name="display_char" maxlength="2" placeholder="地圖上顯示一字，預設「我」">
				</div>
				<div class="auth-field auth-field-create" id="auth-gender-wrap" hidden>
					<span class="auth-label">性別</span>
					<div class="auth-gender-options">
						<label class="auth-radio"><input type="radio" name="gender" value="男" id="auth-gender-m" checked> 男</label>
						<label class="auth-radio"><input type="radio" name="gender" value="女" id="auth-gender-f"> 女</label>
					</div>
				</div>
				<div class="auth-actions" id="auth-login-actions">
					<button type="submit" name="action" value="login" id="auth-btn-login">登入</button>
					<button type="button" id="auth-btn-switch">沒有帳號？創角</button>
				</div>
				<div class="auth-actions auth-actions-create" id="auth-create-actions" hidden>
					<button type="submit" name="action" value="create" id="auth-btn-create">創角</button>
					<button type="button" id="auth-btn-back">已有帳號？登入</button>
				</div>
			</form>
		</div>
	</div>

	<div id="app" class="app-after-login" hidden>
		<!-- 頂列：左＝當前地點名稱，右＝遊戲時間＋五個保留鈕 -->
		<header id="top-bar" class="top-row">
			<div id="room-name-wrap" class="room-name-wrap">
				<h1 id="room-name" class="room-name"></h1>
			</div>
			<div class="top-bar-right">
				<div id="game-time" class="game-time" title="日晷：9→3 為日、3→9 為夜">
					<span id="game-time-date" class="game-time-date" aria-live="polite"></span>
					<svg class="game-time-svg" viewBox="0 0 32 32" aria-hidden="true">
						<circle class="game-time-face" cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
						<line id="game-time-hand" class="game-time-hand" x1="16" y1="16" x2="16" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" transform="rotate(0 16 16)"/>
					</svg>
					<span id="game-time-label" class="game-time-label" aria-live="polite"></span>
				</div>
				<div class="top-bar-slots">
					<button type="button" class="slot-btn slot-btn-active" id="btn-inventory">背包</button>
					<button type="button" class="slot-btn" disabled>保留</button>
					<button type="button" class="slot-btn" disabled>地圖</button>
					<button type="button" class="slot-btn" disabled>訊息</button>
					<button type="button" class="slot-btn" disabled>設定</button>
				</div>
			</div>
		</header>

		<!-- 房間描述欄：全文寬，【】內為綠色強調 -->
		<section id="room-desc-panel" class="panel room-desc-panel">
			<div id="room-desc" class="room-desc"></div>
		</section>

		<!-- 敘事欄：左側同房人物、右側可擴充 -->
		<section id="narrative-panel" class="panel narrative-panel">
			<div id="persons-panel" class="persons-panel">
				<ul id="entities-list" class="entities-list"></ul>
			</div>
			<div id="narrative-right" class="narrative-right">
				<div id="log" class="log-content" role="log"></div>
			</div>
		</section>

		<!-- 狀態欄：姓名 + 四條狀態，疊在路徑欄上方 -->
		<section id="status-panel" class="panel status-panel">
			<div class="status-name-wrap">
				<div id="player-name" class="player-name" role="button" tabindex="0" title="點擊開啟角色">姓名</div>
			</div>
			<div class="status-bars">
				<div class="stat-row">
					<span class="stat-label">氣血</span>
					<div class="stat-bar-wrap"><div id="bar-hp" class="stat-bar stat-bar-hp" style="width: 88%"></div></div>
				</div>
				<div class="stat-row">
					<span class="stat-label">精神</span>
					<div class="stat-bar-wrap"><div id="bar-spirit" class="stat-bar stat-bar-spirit" style="width: 85%"></div></div>
				</div>
				<div class="stat-row">
					<span class="stat-label">內力</span>
					<div class="stat-bar-wrap"><div id="bar-inner" class="stat-bar stat-bar-inner" style="width: 90%"></div></div>
				</div>
				<div class="stat-row">
					<span class="stat-label">體力</span>
					<div class="stat-bar-wrap"><div id="bar-stamina" class="stat-bar stat-bar-stamina" style="width: 82%"></div></div>
				</div>
			</div>
		</section>

		<!-- 路徑欄：置底，僅出口 -->
		<section id="movement-panel" class="panel movement-panel">
			<div class="path-section">
				<span class="path-label">出口：</span>
				<div id="exits-buttons" class="exits-list"></div>
			</div>
		</section>
	</div>

	<!-- 點擊玩家姓名開啟：寬自適應、高＝log 區（JS 設定），四分頁 -->
	<div id="player-modal-overlay" class="player-modal-overlay" hidden aria-hidden="true">
		<div id="player-modal" class="player-modal" role="dialog" aria-modal="true" aria-labelledby="player-modal-title">
			<div class="player-modal-header">
				<h2 id="player-modal-title" class="player-modal-title"></h2>
				<button type="button" class="player-modal-close" id="player-modal-close" aria-label="關閉">×</button>
			</div>
			<div class="player-modal-tabs" role="tablist">
				<button type="button" class="player-modal-tab active" role="tab" aria-selected="true" data-tab="status">狀態</button>
				<button type="button" class="player-modal-tab" role="tab" aria-selected="false" data-tab="equip">裝備</button>
				<button type="button" class="player-modal-tab" role="tab" aria-selected="false" data-tab="skill">技能</button>
				<button type="button" class="player-modal-tab" role="tab" aria-selected="false" data-tab="starplate">星盤</button>
			</div>
			<div class="player-modal-body">
				<div id="player-modal-pane-status" class="player-modal-pane active" role="tabpanel" data-tab="status">
					<div id="status-content" class="status-content"></div>
				</div>
				<div id="player-modal-pane-equip" class="player-modal-pane" role="tabpanel" data-tab="equip" hidden>裝備內容（待接資料）</div>
				<div id="player-modal-pane-skill" class="player-modal-pane" role="tabpanel" data-tab="skill" hidden>
					<div id="skill-content" class="skill-content"></div>
				</div>
				<div id="player-modal-pane-starplate" class="player-modal-pane" role="tabpanel" data-tab="starplate" hidden>
					<div id="starplate-content" class="starplate-content"></div>
				</div>
			</div>
		</div>
	</div>

	<!-- 背包彈窗：頂欄「背包」按鈕開啟，獨立於人物彈窗 -->
	<div id="inventory-modal-overlay" class="inventory-modal-overlay" hidden aria-hidden="true">
		<div id="inventory-modal" class="inventory-modal" role="dialog" aria-modal="true" aria-labelledby="inventory-modal-title">
			<div class="inventory-modal-header">
				<h2 id="inventory-modal-title" class="inventory-modal-title">背包</h2>
				<button type="button" class="player-modal-close" id="inventory-modal-close" aria-label="關閉">×</button>
			</div>
			<div class="inventory-modal-body">
				<div id="inventory-weight" class="inventory-weight"></div>
				<div id="inventory-list" class="inventory-list"></div>
			</div>
		</div>
	</div>

	<script src="main.js?v=8.26"></script>
	<script src="mud-text.js?v=4.2"></script>
	<script src="ui.js?v=3.9"></script>
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', function () {
				navigator.serviceWorker.register('/sw.js?v=4').then(function (reg) {
					reg.addEventListener('updatefound', function () {
						var w = reg.installing;
						w.addEventListener('statechange', function () {
							if (w.state === 'installed' && navigator.serviceWorker.controller) {
								window.location.reload();
							}
						});
					});
				}).catch(function () {});
			});
		}
	</script>
</body>
</html>
