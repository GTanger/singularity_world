<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>浮生地圖檢視器</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; }
    body {
      background: #1a1a2e;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
    }
    header {
      flex-shrink: 0;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: #eee;
    }
    .login-form {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .login-form input {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e8e8e8;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 140px;
    }
    .login-form input::placeholder { color: #6b7a8a; }
    .login-form button {
      background: linear-gradient(180deg, #0f3460 0%, #16213e 100%);
      color: #e8e8e8;
      border: 1px solid #0f3460;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .login-form button:hover {
      background: #0f3460;
      border-color: #e94560;
    }
    .login-form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      flex: 1;
      min-width: 200px;
      padding: 8px 14px;
      background: #0f3460;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #a0a0b0;
    }
    .status strong { color: #e8e8e8; }
    #error-msg { color: #e94560; font-size: 0.85rem; }
    #mynetwork {
      flex: 1;
      min-height: 0;
      width: 100%;
      background: #1a1a2e;
    }
  </style>
</head>
<body>
  <header>
    <h1>浮生地圖檢視器</h1>
    <div class="login-form" id="loginForm">
      <input type="text" id="inputId" placeholder="角色 ID" autocomplete="username" />
      <input type="password" id="inputPw" placeholder="密碼" autocomplete="current-password" />
      <button type="button" id="btnLogin">登入並顯示位置</button>
    </div>
    <span id="error-msg"></span>
    <div class="status" id="status">正在載入專案地圖…</div>
  </header>
  <div id="mynetwork"></div>

  <script>
    (function () {
      var DATA_URL = '/data/rooms.json';
      var ZONE_COLORS = {
        '飛霜湖': '#4a90d9',
        '霜林': '#3d8b6e',
        '浮生客棧': '#d97b4a',
        '浮生大街': '#4ad9d9',
        '飛霜大街': '#8fbdb9',
        '打鐵巷': '#c94a4a',
        '界壁': '#6b6b8a'
      };
      var DEFAULT_NODE_COLOR = '#7a7a9e';
      var PLAYER_GLOW_BORDER = 6;
      var PLAYER_GLOW_COLOR = 'rgba(233, 69, 96, 0.75)';
      var PLAYER_NODE_SIZE_FACTOR = 1.4;

      function zoneToColor(zone) {
        return ZONE_COLORS[zone] || DEFAULT_NODE_COLOR;
      }

      function buildAliasMap(exits) {
        var map = {};
        if (!Array.isArray(exits)) return map;
        exits.forEach(function (exit) {
          var target = exit.to || '';
          var dir = exit.direction || '';
          if (!target || !dir) return;
          if (!map[target]) map[target] = {};
          map[target][dir] = true;
        });
        var result = {};
        Object.keys(map).forEach(function (rid) {
          result[rid] = Object.keys(map[rid]);
        });
        return result;
      }

      function countExits(exits) {
        var map = {};
        if (!Array.isArray(exits)) return map;
        exits.forEach(function (exit) {
          var rid = exit.from || '';
          map[rid] = (map[rid] || 0) + 1;
        });
        return map;
      }

      var NODE_SIZE_MIN = 8;
      var NODE_SIZE_STEP = 1.5;

      function buildNodes(rooms, aliasMap, exitCounts, playerRoomId) {
        if (!Array.isArray(rooms)) return [];
        return rooms.map(function (room) {
          var id = room.id || '';
          var name = room.name || id;
          var zone = room.zone || '';
          var tags = Array.isArray(room.tags) ? room.tags.join('、') : '';
          var desc = room.description || '';
          var aliases = aliasMap[id] || [];
          var exits = exitCounts[id] || 0;
          var label = name + '\n(' + id + ')';
          var title = [
            '【' + name + '】',
            aliases.length ? '出口代稱：' + aliases.join('、') : '',
            '區域：' + zone,
            '出口數：' + exits,
            tags ? '標籤：' + tags : '',
            desc ? '描述：' + desc : ''
          ].filter(Boolean).join('\n');
          var size = NODE_SIZE_MIN + (exits - 1) * NODE_SIZE_STEP;
          if (size < NODE_SIZE_MIN) size = NODE_SIZE_MIN;
          var isPlayer = playerRoomId && id === playerRoomId;
          if (isPlayer) size = size * PLAYER_NODE_SIZE_FACTOR;
          var color = zoneToColor(zone);
          var node = {
            id: id,
            label: label,
            title: title,
            size: size,
            color: color
          };
          if (isPlayer) {
            node.color = {
              background: color,
              border: PLAYER_GLOW_COLOR,
              highlight: { background: color, border: '#e94560' },
              hover: { background: color, border: PLAYER_GLOW_COLOR }
            };
            node.borderWidth = PLAYER_GLOW_BORDER;
            node.borderWidthSelected = PLAYER_GLOW_BORDER + 1;
          }
          return node;
        });
      }

      function buildEdges(exits) {
        if (!Array.isArray(exits)) return [];
        var pairSet = {};
        exits.forEach(function (exit) {
          var key = exit.from + '|' + exit.to;
          pairSet[key] = exit;
        });
        var processed = {};
        var result = [];
        var idx = 0;
        exits.forEach(function (exit) {
          var fwd = exit.from + '|' + exit.to;
          var rev = exit.to + '|' + exit.from;
          if (processed[fwd]) return;
          if (pairSet[rev]) {
            processed[fwd] = true;
            processed[rev] = true;
            result.push({
              id: 'e' + idx++,
              from: exit.from,
              to: exit.to,
              arrows: { to: { enabled: true, type: 'arrow' }, from: { enabled: true, type: 'arrow' } },
              dashes: false,
              width: 1.5
            });
          } else {
            processed[fwd] = true;
            result.push({
              id: 'e' + idx++,
              from: exit.from,
              to: exit.to,
              arrows: { to: { enabled: true, type: 'arrow' } },
              dashes: [6, 4],
              width: 1.5
            });
          }
        });
        return result;
      }

      function setStatus(text) {
        document.getElementById('status').textContent = text;
      }
      function setError(text) {
        document.getElementById('error-msg').textContent = text;
      }

      function loadFromJson(json, playerRoomId) {
        var rooms = json.rooms;
        var exits = json.exits;
        if (!rooms || !exits) {
          setStatus('無效的 rooms.json：需包含 rooms 與 exits 陣列。');
          setError('');
          return false;
        }
        var aliasMap = buildAliasMap(exits);
        var exitCounts = countExits(exits);
        var nodes = buildNodes(rooms, aliasMap, exitCounts, playerRoomId || null);
        var edges = buildEdges(exits);
        drawGraph(nodes, edges);
        var msg = '已載入：' + nodes.length + ' 個節點，' + edges.length + ' 條連線。';
        if (playerRoomId) msg += ' 當前位置已標示（外圈光圈）。';
        setStatus(msg);
        setError('');
        return true;
      }

      var network = null;
      var nodesDataset = null;
      var edgesDataset = null;
      var currentPlayerRoomId = null;
      var lastJson = null;

      function drawGraph(nodes, edges) {
        var container = document.getElementById('mynetwork');
        if (!nodesDataset) {
          nodesDataset = new vis.DataSet(nodes);
          edgesDataset = new vis.DataSet(edges);
        } else {
          nodesDataset.clear();
          edgesDataset.clear();
          nodes.forEach(function (n) { nodesDataset.add(n); });
          edges.forEach(function (e) { edgesDataset.add(e); });
        }
        var data = { nodes: nodesDataset, edges: edgesDataset };
        var options = {
          physics: {
            enabled: true,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: {
              gravitationalConstant: -80,
              centralGravity: 0.01,
              springLength: 120,
              springConstant: 0.08,
              damping: 0.4,
              avoidOverlap: 0.5
            },
            stabilization: {
              iterations: 200,
              updateInterval: 25
            }
          },
          nodes: {
            font: {
              color: '#e8e8e8',
              size: 12,
              face: 'Noto Sans TC, Microsoft JhengHei, sans-serif'
            },
            borderWidth: 1,
            borderWidthSelected: 2,
            shape: 'dot'
          },
          edges: {
            color: { color: '#4a5568', highlight: '#e94560' },
            smooth: { type: 'continuous', roundness: 0.2 },
            arrowStrikethrough: false
          },
          interaction: {
            hover: true,
            zoomView: true,
            dragView: true,
            tooltipDelay: 100
          }
        };
        if (!network) {
          network = new vis.Network(container, data, options);
        } else {
          network.setData(data);
          network.setOptions(options);
        }
        if (currentPlayerRoomId && network) {
          network.focus(currentPlayerRoomId, { scale: 1.2, animation: true });
        }
      }

      function fetchMapOnly() {
        setStatus('正在載入專案地圖…');
        setError('');
        fetch(DATA_URL, { method: 'GET' })
          .then(function (res) {
            if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
            return res.json();
          })
          .then(function (json) {
            lastJson = json;
            if (!loadFromJson(json, currentPlayerRoomId)) {
              setError('無效的 rooms.json');
            }
          })
          .catch(function (err) {
            setStatus('無法載入 ' + DATA_URL + '，請確認由專案伺服器開啟。');
            setError(err.message || '');
          });
      }

      function doLogin() {
        var id = document.getElementById('inputId').value.trim();
        var pw = document.getElementById('inputPw').value.trim();
        if (!id || !pw) {
          setError('請輸入角色 ID 與密碼');
          return;
        }
        setError('');
        var btn = document.getElementById('btnLogin');
        btn.disabled = true;
        btn.textContent = '驗證中…';
        fetch('/api/player-room?id=' + encodeURIComponent(id) + '&pw=' + encodeURIComponent(pw))
          .then(function (res) {
            if (!res.ok) return res.json().then(function (b) { throw new Error(b.error || '驗證失敗'); });
            return res.json();
          })
          .then(function (data) {
            currentPlayerRoomId = data.room_id || null;
            if (lastJson) {
              loadFromJson(lastJson, currentPlayerRoomId);
            } else {
              fetch(DATA_URL).then(function (r) { return r.json(); }).then(function (json) {
                lastJson = json;
                loadFromJson(json, currentPlayerRoomId);
              });
            }
          })
          .catch(function (err) {
            setError(err.message || '登入失敗');
          })
          .finally(function () {
            btn.disabled = false;
            btn.textContent = '登入並顯示位置';
          });
      }

      document.getElementById('btnLogin').addEventListener('click', doLogin);
      document.getElementById('inputPw').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') doLogin();
      });
      document.getElementById('inputId').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('inputPw').focus();
      });

      (function init() {
        fetchMapOnly();
      })();
    })();
  </script>
</body>
</html>
