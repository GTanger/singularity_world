<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>房間管理 - 奇點世界</title>
	<style>
		* { box-sizing: border-box; }
		body { font-family: sans-serif; margin: 0; padding: 1rem; background: #1a1a1a; color: #e0e0e0; }
		h1 { margin-top: 0; }
		table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
		th, td { border: 1px solid #444; padding: 0.5rem; text-align: left; }
		th { background: #252b33; }
		tr:nth-child(even) { background: #222; }
		.description { max-width: 20rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.exits { font-size: 0.9rem; color: #8b949e; }
		.exits span { display: inline-block; margin-right: 0.5rem; }
		.exits .del-exit { cursor: pointer; color: #f56c6c; margin-left: 0.25rem; }
		form { background: #252b33; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; max-width: 28rem; }
		form label { display: block; margin-top: 0.5rem; }
		form input, form textarea { width: 100%; padding: 0.4rem; background: #1a1a1a; border: 1px solid #444; color: #e0e0e0; border-radius: 4px; }
		form textarea { min-height: 4rem; resize: vertical; }
		button, .btn { padding: 0.4rem 0.75rem; border-radius: 4px; cursor: pointer; border: 1px solid #555; background: #2a2a2a; color: #e0e0e0; }
		button:hover, .btn:hover { background: #3a3a3a; }
		button.danger { background: #5a2a2a; color: #f56c6c; }
		button.danger:hover { background: #6a3a3a; }
		.msg { margin: 0.5rem 0; padding: 0.5rem; border-radius: 4px; }
		.msg.ok { background: #1a3a1a; color: #7ee787; }
		.msg.err { background: #3a1a1a; color: #f56c6c; }
		.add-exit { margin-top: 0.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
		.add-exit input { width: 5rem; }
		#roomId { font-family: monospace; }
	</style>
</head>
<body>
	<h1>房間管理</h1>
	<p><a href="/" style="color: #79bbff;">← 回遊戲</a></p>
	<div id="msg"></div>

	<section>
		<h2>新增房間</h2>
		<form id="form-add">
			<label>ID（英文，例：north_room）<input type="text" id="add-id" required placeholder="north_room"></label>
			<label>名稱<input type="text" id="add-name" placeholder="北房"></label>
			<label>描述<textarea id="add-desc" placeholder="房間描述…"></textarea></label>
			<button type="submit">新增</button>
		</form>
	</section>

	<section>
		<h2>所有房間</h2>
		<table>
			<thead>
				<tr><th>ID</th><th>名稱</th><th>描述</th><th>出口</th><th>操作</th></tr>
			</thead>
			<tbody id="room-list"></tbody>
		</table>
	</section>

	<section id="section-edit" style="display:none;">
		<h2>編輯房間</h2>
		<form id="form-edit">
			<label>ID（不可改）<input type="text" id="edit-id" readonly class="readonly"></label>
			<label>名稱<input type="text" id="edit-name"></label>
			<label>描述<textarea id="edit-desc"></textarea></label>
			<button type="submit">儲存</button>
			<button type="button" onclick="document.getElementById('section-edit').style.display='none';">取消</button>
		</form>
	</section>

	<script>
		var API = '/api/rooms';
		function msg(s, isErr) {
			var el = document.getElementById('msg');
			el.textContent = s;
			el.className = 'msg ' + (isErr ? 'err' : 'ok');
			setTimeout(function() { el.textContent = ''; el.className = ''; }, 4000);
		}
		function loadRooms(noCache) {
			var url = API;
			if (noCache) url += '?_=' + Date.now();
			fetch(url).then(function(r) { return r.json(); }).then(function(data) {
				var tbody = document.getElementById('room-list');
				tbody.innerHTML = '';
				(data.rooms || []).forEach(function(r) {
					var tr = document.createElement('tr');
					var room = r.room || r;
					var exits = r.exits || [];
					var exitsHtml = exits.map(function(e) {
						return '<span>' + e.direction + '→' + (e.to_room_name || e.to_room_id) + '<span class="del-exit" data-from="' + room.id + '" data-dir="' + e.direction + '" title="刪除此出口">✕</span></span>';
					}).join('');
					tr.innerHTML =
						'<td><code>' + escapeHtml(room.id) + '</code></td>' +
						'<td>' + escapeHtml(room.name) + '</td>' +
						'<td class="description" title="' + escapeHtml(room.description) + '">' + escapeHtml(room.description) + '</td>' +
						'<td class="exits">' + (exitsHtml || '—') + '</td>' +
						'<td><button class="edit-room btn" data-id="' + escapeHtml(room.id) + '" data-name="' + escapeHtml(room.name) + '" data-desc="' + escapeHtml(room.description) + '">編輯</button> ' +
						(room.id !== 'lobby' ? '<button class="danger del-room" data-id="' + escapeHtml(room.id) + '">刪除</button>' : '') + '</td>';
					tbody.appendChild(tr);
				});
				bindRoomButtons();
			}).catch(function(e) { msg('載入失敗：' + e.message, true); });
		}
		function escapeHtml(s) {
			if (!s) return '';
			var d = document.createElement('div');
			d.textContent = s;
			return d.innerHTML;
		}
		function updateRoomRowInTable(room, exits) {
			var tbody = document.getElementById('room-list');
			var rows = tbody.querySelectorAll('tr');
			for (var i = 0; i < rows.length; i++) {
				var code = rows[i].querySelector('td code');
				if (code && code.textContent === room.id) {
					var exitsHtml = (exits || []).map(function(e) {
						return '<span>' + e.direction + '→' + (e.to_room_name || e.to_room_id) + '<span class="del-exit" data-from="' + escapeHtml(room.id) + '" data-dir="' + escapeHtml(e.direction) + '" title="刪除此出口">✕</span></span>';
					}).join('');
					rows[i].innerHTML =
						'<td><code>' + escapeHtml(room.id) + '</code></td>' +
						'<td>' + escapeHtml(room.name) + '</td>' +
						'<td class="description" title="' + escapeHtml(room.description) + '">' + escapeHtml(room.description) + '</td>' +
						'<td class="exits">' + (exitsHtml || '—') + '</td>' +
						'<td><button class="edit-room btn" data-id="' + escapeHtml(room.id) + '" data-name="' + escapeHtml(room.name) + '" data-desc="' + escapeHtml(room.description) + '">編輯</button> ' +
						(room.id !== 'lobby' ? '<button class="danger del-room" data-id="' + escapeHtml(room.id) + '">刪除</button>' : '') + '</td>';
					bindRoomButtons();
					return;
				}
			}
		}
		function bindRoomButtons() {
			document.querySelectorAll('.edit-room').forEach(function(btn) {
				btn.onclick = function() {
					document.getElementById('edit-id').value = btn.dataset.id;
					document.getElementById('edit-name').value = btn.dataset.name || '';
					document.getElementById('edit-desc').value = btn.dataset.desc || '';
					document.getElementById('section-edit').style.display = 'block';
				};
			});
			document.querySelectorAll('.del-room').forEach(function(btn) {
				btn.onclick = function() {
					if (!confirm('確定刪除房間「' + btn.dataset.id + '」？房內的人會移到大廳。')) return;
					fetch(API + '/' + encodeURIComponent(btn.dataset.id), { method: 'DELETE' })
						.then(function(r) { if (r.ok) { msg('已刪除'); loadRooms(); } else return r.json().then(function(d) { throw new Error(d.error || r.status); }); })
						.catch(function(e) { msg(e.message, true); });
				};
			});
			document.querySelectorAll('.del-exit').forEach(function(btn) {
				btn.onclick = function() {
					var from = btn.dataset.from, dir = btn.dataset.dir;
					if (!confirm('刪除出口「' + from + '」的「' + dir + '」？')) return;
					fetch(API + '/' + encodeURIComponent(from) + '/exits/' + encodeURIComponent(dir), { method: 'DELETE' })
						.then(function(r) { if (r.ok) { msg('已刪除出口'); loadRooms(); } else return r.json().then(function(d) { throw new Error(d.error || r.status); }); })
						.catch(function(e) { msg(e.message, true); });
				};
			});
		}
		document.getElementById('form-add').onsubmit = function(e) {
			e.preventDefault();
			var id = document.getElementById('add-id').value.trim();
			var name = document.getElementById('add-name').value.trim() || id;
			var desc = document.getElementById('add-desc').value.trim();
			fetch(API, {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ id: id, name: name, description: desc })
			}).then(function(r) {
				if (r.ok || r.status === 201) { msg('已新增房間'); document.getElementById('form-add').reset(); loadRooms(); }
				else return r.json().then(function(d) { throw new Error(d.error || r.status); });
			}).catch(function(e) { msg(e.message, true); });
		};
		var formEdit = document.getElementById('form-edit');
		if (formEdit) {
			formEdit.onsubmit = function(e) {
				e.preventDefault();
				var id = document.getElementById('edit-id').value;
				var name = document.getElementById('edit-name').value.trim();
				var desc = document.getElementById('edit-desc').value.trim();
				fetch(API + '/' + encodeURIComponent(id), {
					method: 'PUT',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ name: name, description: desc })
				}).then(function(r) {
					return r.json().then(function(data) {
						if (r.ok) {
							msg('已更新');
							document.getElementById('section-edit').style.display = 'none';
							if (data.room) { updateRoomRowInTable(data.room, data.exits || []); }
							else { loadRooms(true); }
						} else { throw new Error(data.error || r.status); }
					});
				}).catch(function(e) { msg(e.message, true); });
			};
		}
		loadRooms();
	</script>

	<section>
		<h2>新增出口</h2>
		<form id="form-exit">
			<label>從房間（ID）<input type="text" id="exit-from" placeholder="lobby" list="room-ids"></label>
			<label>出口代號（東／天／101…）<input type="text" id="exit-dir" placeholder="東、天、101"></label>
			<label>目標房間（ID）<input type="text" id="exit-to" placeholder="east_street" list="room-ids"></label>
			<datalist id="room-ids"></datalist>
			<button type="submit">新增出口</button>
		</form>
	</section>

	<script>
		fetch(API).then(function(r) { return r.json(); }).then(function(data) {
			var list = document.getElementById('room-ids');
			list.innerHTML = '';
			(data.rooms || []).forEach(function(r) {
				var room = r.room || r;
				var opt = document.createElement('option');
				opt.value = room.id;
				list.appendChild(opt);
			});
		});
		document.getElementById('form-exit').onsubmit = function(e) {
			e.preventDefault();
			var from = document.getElementById('exit-from').value.trim();
			var dir = document.getElementById('exit-dir').value.trim();
			var to = document.getElementById('exit-to').value.trim();
			if (!from || !dir || !to) { msg('請填寫從房間、出口代號、目標房間', true); return; }
			fetch(API + '/' + encodeURIComponent(from) + '/exits', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ direction: dir, to_room_id: to })
			}).then(function(r) {
				if (r.ok || r.status === 201) { msg('已新增出口'); document.getElementById('form-exit').reset(); loadRooms(); }
				else return r.json().then(function(d) { throw new Error(d.error || r.status); });
			}).catch(function(e) { msg(e.message, true); });
		};
	</script>
</body>
</html>
